# /etc/apache2/sites-available/phpmyadmin-local.conf
# phpMyAdmin must stay local-only. Access it from your computer with a PuTTY
# tunnel from local port 8080 to server destination 127.0.0.1:8081.

Listen 127.0.0.1:8081

<VirtualHost 127.0.0.1:8081>
    ServerName localhost

    Alias /phpmyadmin /usr/share/phpmyadmin

    <Directory /usr/share/phpmyadmin>
        Options SymLinksIfOwnerMatch
        DirectoryIndex index.php
        AllowOverride All
        Require local
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/phpmyadmin_local_error.log
    CustomLog ${APACHE_LOG_DIR}/phpmyadmin_local_access.log combined
</VirtualHost>
