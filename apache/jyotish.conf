# /etc/apache2/sites-available/jyotish.conf
# Enable: sudo a2ensite jyotish
# Required modules:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite ssl headers

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ── HTTPS ─────────────────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com

    # ── SSL (Let's Encrypt via certbot) ─────────────────────────────────
    SSLEngine On
    SSLCertificateFile      /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/yourdomain.com/privkey.pem
    Include                 /etc/letsencrypt/options-ssl-apache.conf

    # ── Security headers ─────────────────────────────────────────────────
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin"

    # ── WebSocket upgrade support ────────────────────────────────────────
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:3000/$1" [P,L]

    # ── API → Express (port 5000) ────────────────────────────────────────
    ProxyPreserveHost On

    <Location /api/>
        ProxyPass        http://127.0.0.1:5000/api/
        ProxyPassReverse http://127.0.0.1:5000/api/
        ProxyTimeout     120
    </Location>

    # ── Next.js static assets — long cache ──────────────────────────────
    <Location /_next/static/>
        ProxyPass        http://127.0.0.1:3000/_next/static/
        ProxyPassReverse http://127.0.0.1:3000/_next/static/
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Location>

    # ── Next.js UI → port 3000 ───────────────────────────────────────────
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # ── Logs ─────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/jyotish_error.log
    CustomLog ${APACHE_LOG_DIR}/jyotish_access.log combined
</VirtualHost>
