# /etc/apache2/sites-available/jyotishstack.conf
# Enable:
#   sudo cp apache/jyotish.conf /etc/apache2/sites-available/jyotishstack.conf
#   sudo a2ensite jyotishstack
# Required modules:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite ssl headers
#
# Run Certbot after DNS points to this VPS:
#   sudo certbot --apache -d jyotishstack.com -d www.jyotishstack.com --redirect

<VirtualHost *:80>
    ServerName jyotishstack.com
    ServerAlias www.jyotishstack.com

    ProxyPreserveHost On
    ProxyTimeout 120

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin"

    <Location /api/>
        ProxyPass        http://127.0.0.1:5000/api/
        ProxyPassReverse http://127.0.0.1:5000/api/
    </Location>

    <Location /_next/static/>
        ProxyPass        http://127.0.0.1:3000/_next/static/
        ProxyPassReverse http://127.0.0.1:3000/_next/static/
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Location>

    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog  ${APACHE_LOG_DIR}/jyotishstack_error.log
    CustomLog ${APACHE_LOG_DIR}/jyotishstack_access.log combined
</VirtualHost>
