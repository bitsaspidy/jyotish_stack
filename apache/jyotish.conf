# /etc/apache2/sites-available/jyotishstackai.conf
# Enable:
#   sudo cp apache/jyotish.conf /etc/apache2/sites-available/jyotishstackai.conf
#   sudo a2ensite jyotishstackai
# Required modules:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite ssl headers
#
# Run Certbot after DNS points to this VPS:
#   sudo certbot --apache -d jyotishstackai.com -d www.jyotishstackai.com --redirect

<VirtualHost *:80>
    ServerName jyotishstackai.com
    ServerAlias www.jyotishstackai.com

    ProxyPreserveHost On

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin"

    <Location /api/>
        ProxyPass        http://127.0.0.1:5000/api/
        ProxyPassReverse http://127.0.0.1:5000/api/
        ProxyTimeout     120
    </Location>

    <Location /_next/static/>
        ProxyPass        http://127.0.0.1:3000/_next/static/
        ProxyPassReverse http://127.0.0.1:3000/_next/static/
        Header set Cache-Control "public, max-age=31536000, immutable"
    </Location>

    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog  ${APACHE_LOG_DIR}/jyotishstackai_error.log
    CustomLog ${APACHE_LOG_DIR}/jyotishstackai_access.log combined
</VirtualHost>
